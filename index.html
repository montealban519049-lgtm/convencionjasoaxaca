<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Convención JAS</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<!-- Buttons -->
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #14532d;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.kpis {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  flex: 1;
  background: #166534;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.kpi h2 {
  margin: 0;
  font-size: 30px;
}

canvas {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 20px;
}

table {
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

.dt-button {
  background: white !important;
  color: #14532d !important;
  border-radius: 8px !important;
  border: none !important;
  padding: 6px 12px !important;
  margin-right: 5px !important;
  font-weight: bold;
}

.dt-button:hover {
  background: #dcfce7 !important;
}

.dataTables_filter input {
  border-radius: 8px;
  padding: 5px;
  border: none;
}

select {
  width: 100%;
  padding: 5px;
  margin-top: 5px;
  border-radius: 6px;
}
</style>

</head>

<body>

<h1>📊 Dashboard Convención JAS</h1>

<div class="kpis">
  <div class="kpi"><h2 id="total">0</h2><p>Total</p></div>
  <div class="kpi"><h2 id="hombres">0</h2><p>Hombres</p></div>
  <div class="kpi"><h2 id="mujeres">0</h2><p>Mujeres</p></div>
</div>

<!-- Gráfica general -->
<canvas id="grafica"></canvas>

<!-- 🔥 Nueva gráfica por estaca -->
<canvas id="graficaEstaca"></canvas>

<table id="tabla" class="display" style="width:100%"></table>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQXEHin29Er8xAayRXtZyYo1B4BnzfTGtpjGfk9rGg9uf-GfJmxHTx4G8krTP4r6w254gUzkPFOI020/pub?gid=162119901&single=true&output=csv")
.then(res => res.text())
.then(data => {

  const filas = data.trim().split("\n").map(f => f.split(","));
  const headers = filas[0];
  const body = filas.slice(1);

  // KPI
  document.getElementById("total").innerText = body.length;

  let hombres = 0;
  let mujeres = 0;

  const generoIndex = headers.findIndex(h => h.toLowerCase().includes("sexo"));
  const estacaIndex = headers.findIndex(h => h.toLowerCase().includes("estaca"));

  body.forEach(row => {
    let genero = row[generoIndex]?.toLowerCase();
    if (genero === "hombre") hombres++;
    if (genero === "mujer") mujeres++;
  });

  document.getElementById("hombres").innerText = hombres;
  document.getElementById("mujeres").innerText = mujeres;

  // 📊 Gráfica general
  new Chart(document.getElementById("grafica"), {
    type: 'bar',
    data: {
      labels: ['Hombres', 'Mujeres'],
      datasets: [{
        label: 'Participantes',
        data: [hombres, mujeres]
      }]
    }
  });

  // 🔥 Agrupar por estaca
  let estacas = {};
  let labels = [];

  body.forEach(row => {
    let estaca = row[estacaIndex] || "Sin dato";
    let genero = row[generoIndex]?.toLowerCase();

    if (!estacas[estaca]) {
      estacas[estaca] = { hombres: 0, mujeres: 0 };
      labels.push(estaca);
    }

    if (genero === "hombre") estacas[estaca].hombres++;
    if (genero === "mujer") estacas[estaca].mujeres++;
  });

  const dataHombres = labels.map(e => estacas[e].hombres);
  const dataMujeres = labels.map(e => estacas[e].mujeres);

  // 📊 Gráfica por estaca
  new Chart(document.getElementById("graficaEstaca"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Hombres',
          data: dataHombres,
          backgroundColor: '#2563eb'
        },
        {
          label: 'Mujeres',
          data: dataMujeres,
          backgroundColor: '#ec4899'
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: 'white' }
        }
      },
      scales: {
        x: {
          ticks: { color: 'white' }
        },
        y: {
          ticks: { color: 'white' }
        }
      }
    }
  });

  // 📋 Tabla
  $('#tabla').DataTable({
    data: body,
    columns: headers.map(h => ({ title: h })),
    dom: 'Bfrtip',
    buttons: ['copy','csv','excel','pdf'],
    pageLength: 100,
    language: {
      search: "Buscar:",
      lengthMenu: "Mostrar _MENU_ registros",
      info: "Mostrando _START_ a _END_ de _TOTAL_",
      paginate: {
        next: "Siguiente",
        previous: "Anterior"
      }
    },
    initComplete: function () {
      this.api().columns().every(function () {
        let column = this;
        let select = $('<select><option value="">Filtrar</option></select>')
          .appendTo($(column.header()))
          .on('change', function () {
            let val = $.fn.dataTable.util.escapeRegex($(this).val());
            column.search(val ? '^' + val + '$' : '', true, false).draw();
          });

        column.data().unique().sort().each(function (d) {
          select.append('<option value="' + d + '">' + d + '</option>');
        });
      });
    }
  });

});
</script>

</body>
</html>
