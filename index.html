<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Empresarial JAS</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #14532d;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  background: #064e3b;
  padding: 10px;
}

.nav button {
  background: transparent;
  border: none;
  color: white;
  margin-right: 10px;
  padding: 10px;
  cursor: pointer;
}

.nav button.active {
  background: #166534;
  border-radius: 8px;
}

/* CONTENIDO */
.section {
  display: none;
  padding: 20px;
}

.active-section {
  display: block;
}

/* FILTROS */
.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

/* KPIs */
.kpis {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  flex: 1;
  background: #166534;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

/* GRAFICAS */
canvas {
  background: white;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* TABLA */
table {
  background: white;
  color: black;
}

/* BOTONES */
.dt-button {
  background: white !important;
  color: #14532d !important;
  border-radius: 8px !important;
}
</style>
</head>

<body>

<!-- 🧭 NAV -->
<div class="nav">
  <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
  <button class="tab" data-tab="tabla">📋 Datos</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" class="section active-section">

<div class="filtros">
  <select id="filtroEstaca"><option value="">Todas las Estacas</option></select>
  <select id="filtroGenero"><option value="">Todos los Géneros</option></select>
</div>

<div class="kpis">
  <div class="kpi"><h2 id="total">0</h2><p>Total</p></div>
  <div class="kpi"><h2 id="hombres">0</h2><p>Hombres</p></div>
  <div class="kpi"><h2 id="mujeres">0</h2><p>Mujeres</p></div>
</div>

<canvas id="grafica"></canvas>
<canvas id="graficaEstaca"></canvas>

</div>

<!-- 📋 TABLA -->
<div id="tabla" class="section">
  <table id="tablaData" class="display" style="width:100%"></table>
</div>

<script>
let dataGlobal = [], headersGlobal = [];
let chart1, chart2, tabla;

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQXEHin29Er8xAayRXtZyYo1B4BnzfTGtpjGfk9rGg9uf-GfJmxHTx4G8krTP4r6w254gUzkPFOI020/pub?gid=162119901&single=true&output=csv")
.then(res => res.text())
.then(data => {
  const filas = data.trim().split("\n").map(f => f.split(","));
  headersGlobal = filas[0];
  dataGlobal = filas.slice(1);

  llenarFiltros();
  actualizarTodo();
});

function llenarFiltros() {
  const eIdx = headersGlobal.findIndex(h=>h.toLowerCase().includes("estaca"));
  const gIdx = headersGlobal.findIndex(h=>h.toLowerCase().includes("sexo"));

  let estacas = new Set(), generos = new Set();

  dataGlobal.forEach(r=>{
    estacas.add(r[eIdx]);
    generos.add(r[gIdx]);
  });

  estacas.forEach(e=>$('#filtroEstaca').append(`<option>${e}</option>`));
  generos.forEach(g=>$('#filtroGenero').append(`<option>${g}</option>`));
}

function filtrar() {
  const e = $('#filtroEstaca').val();
  const g = $('#filtroGenero').val();

  const eIdx = headersGlobal.findIndex(h=>h.toLowerCase().includes("estaca"));
  const gIdx = headersGlobal.findIndex(h=>h.toLowerCase().includes("sexo"));

  return dataGlobal.filter(r =>
    (!e || r[eIdx]===e) &&
    (!g || r[gIdx]===g)
  );
}

function actualizarTodo() {
  const datos = filtrar();
  const gIdx = headersGlobal.findIndex(h=>h.toLowerCase().includes("sexo"));
  const eIdx = headersGlobal.findIndex(h=>h.toLowerCase().includes("estaca"));

  let h=0,m=0;
  datos.forEach(r=>{
    if(r[gIdx]?.toLowerCase()==="hombre") h++;
    if(r[gIdx]?.toLowerCase()==="mujer") m++;
  });

  total.innerText=datos.length;
  hombres.innerText=h;
  mujeres.innerText=m;

  if(chart1) chart1.destroy();
  chart1=new Chart(grafica,{type:'bar',data:{labels:['H','M'],datasets:[{data:[h,m]}]}});

  let estacas={};
  datos.forEach(r=>{
    let est=r[eIdx]||"Sin dato";
    if(!estacas[est]) estacas[est]={h:0,m:0};
    if(r[gIdx]==="Hombre") estacas[est].h++;
    if(r[gIdx]==="Mujer") estacas[est].m++;
  });

  let labels=Object.keys(estacas);
  let dh=labels.map(e=>estacas[e].h);
  let dm=labels.map(e=>estacas[e].m);

  if(chart2) chart2.destroy();
  chart2=new Chart(graficaEstaca,{
    type:'bar',
    data:{labels,datasets:[{label:'Hombres',data:dh},{label:'Mujeres',data:dm}]}
  });

  if(tabla) tabla.destroy();
  tabla=$('#tablaData').DataTable({
    data:datos,
    columns:headersGlobal.map(h=>({title:h})),
    dom:'Bfrtip',
    buttons:['copy','csv','excel','pdf'],
    pageLength:100
  });
}

$('#filtroEstaca,#filtroGenero').on('change',actualizarTodo);

// navegación
$('.tab').click(function(){
  $('.tab').removeClass('active');
  $(this).addClass('active');

  $('.section').removeClass('active-section');
  $('#'+$(this).data('tab')).addClass('active-section');
});
</script>

</body>
</html>
