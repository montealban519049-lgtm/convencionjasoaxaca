<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Convención JAS</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<!-- Buttons -->
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* KPIs */
.kpis {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  flex: 1;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.kpi h2 {
  margin: 0;
  font-size: 28px;
}

canvas {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 20px;
}

table {
  background: white;
  color: black;
}
</style>

</head>

<body>

<h1>📊 Dashboard Convención JAS</h1>

<div class="kpis">
  <div class="kpi"><h2 id="total">0</h2><p>Total</p></div>
  <div class="kpi"><h2 id="hombres">0</h2><p>Hombres</p></div>
  <div class="kpi"><h2 id="mujeres">0</h2><p>Mujeres</p></div>
</div>

<canvas id="grafica"></canvas>

<table id="tabla" class="display" style="width:100%"></table>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQXEHin29Er8xAayRXtZyYo1B4BnzfTGtpjGfk9rGg9uf-GfJmxHTx4G8krTP4r6w254gUzkPFOI020/pub?gid=162119901&single=true&output=csv")
.then(res => res.text())
.then(data => {

  const filas = data.trim().split("\n").map(f => f.split(","));
  const headers = filas[0];
  const body = filas.slice(1);

  // KPI
  document.getElementById("total").innerText = body.length;

  let hombres = 0;
  let mujeres = 0;

  const generoIndex = headers.findIndex(h => h.toLowerCase().includes("sexo"));

  body.forEach(row => {
    if (row[generoIndex]?.toLowerCase() === "hombre") hombres++;
    if (row[generoIndex]?.toLowerCase() === "mujer") mujeres++;
  });

  document.getElementById("hombres").innerText = hombres;
  document.getElementById("mujeres").innerText = mujeres;

  // Gráfica
  new Chart(document.getElementById("grafica"), {
    type: 'bar',
    data: {
      labels: ['Hombres', 'Mujeres'],
      datasets: [{
        label: 'Participantes',
        data: [hombres, mujeres]
      }]
    }
  });

  // Tabla
  $('#tabla').DataTable({
    data: body,
    columns: headers.map(h => ({ title: h })),
    dom: 'Bfrtip',
    buttons: ['excel', 'pdf'],
    pageLength: 10,
    language: {
      search: "Buscar:",
      paginate: {
        next: "Siguiente",
        previous: "Anterior"
      }
    }
  });

});
</script>

</body>
</html>
