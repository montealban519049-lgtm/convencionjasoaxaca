<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Empresarial JAS</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #14532d;
  color: white;
}

.nav {
  display: flex;
  background: #064e3b;
  padding: 10px;
}

.nav button {
  background: transparent;
  border: none;
  color: white;
  margin-right: 10px;
  padding: 10px;
  cursor: pointer;
}

.nav button.active {
  background: #166534;
  border-radius: 8px;
}

.section { display: none; padding: 20px; }
.active-section { display: block; }

.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

.kpis {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  flex: 1;
  background: #166534;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

canvas {
  background: white;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  background: white;
  color: black;
}

.dt-button {
  background: white !important;
  color: #14532d !important;
  border-radius: 8px !important;
}
</style>
</head>

<body>

<div class="nav">
  <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
  <button class="tab" data-tab="tabla">📋 Datos</button>
</div>

<div id="dashboard" class="section active-section">

<div class="filtros">
  <select id="filtroEstaca"><option value="">Todas las Estacas</option></select>
  <select id="filtroBarrio"><option value="">Todos los Barrios</option></select>
  <select id="filtroGenero"><option value="">Todos los Géneros</option></select>
</div>

<div class="kpis">
  <div class="kpi"><h2 id="total">0</h2><p>Total</p></div>
  <div class="kpi"><h2 id="hombres">0</h2><p>Hombres</p></div>
  <div class="kpi"><h2 id="mujeres">0</h2><p>Mujeres</p></div>
</div>

<canvas id="graficaEstaca"></canvas>

</div>

<div id="tabla" class="section">
  <table id="tablaData" class="display" style="width:100%"></table>
</div>

<script>
let dataGlobal=[], headersGlobal=[];
let chart, tabla;

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQXEHin29Er8xAayRXtZyYo1B4BnzfTGtpjGfk9rGg9uf-GfJmxHTx4G8krTP4r6w254gUzkPFOI020/pub?gid=162119901&single=true&output=csv")
.then(res=>res.text())
.then(data=>{
  const filas=data.trim().split("\n").map(f=>f.split(","));
  headersGlobal=filas[0];
  dataGlobal=filas.slice(1);

  llenarFiltros();
  actualizar();
});

function idx(nombre){
  return headersGlobal.findIndex(h=>h.toLowerCase().includes(nombre));
}

function llenarFiltros(){
  const e=idx("estaca"), b=idx("barrio"), g=idx("sexo");

  let estacas=new Set(), barrios=new Set(), generos=new Set();

  dataGlobal.forEach(r=>{
    estacas.add(r[e]);
    barrios.add(r[b]);
    generos.add(r[g]);
  });

  estacas.forEach(v=>$('#filtroEstaca').append(`<option>${v}</option>`));
  barrios.forEach(v=>$('#filtroBarrio').append(`<option>${v}</option>`));
  generos.forEach(v=>$('#filtroGenero').append(`<option>${v}</option>`));
}

function actualizarBarrios(){
  const eSel=$('#filtroEstaca').val();
  const e=idx("estaca"), b=idx("barrio");

  let barrios=new Set();

  dataGlobal.forEach(r=>{
    if(!eSel || r[e]===eSel) barrios.add(r[b]);
  });

  $('#filtroBarrio').html('<option value="">Todos los Barrios</option>');
  barrios.forEach(v=>$('#filtroBarrio').append(`<option>${v}</option>`));
}

function filtrar(){
  const eSel=$('#filtroEstaca').val();
  const bSel=$('#filtroBarrio').val();
  const gSel=$('#filtroGenero').val();

  const e=idx("estaca"), b=idx("barrio"), g=idx("sexo");

  return dataGlobal.filter(r=>
    (!eSel || r[e]===eSel) &&
    (!bSel || r[b]===bSel) &&
    (!gSel || r[g]===gSel)
  );
}

function actualizar(){
  actualizarBarrios();

  const datos=filtrar();
  const g=idx("sexo"), e=idx("estaca");

  let h=0,m=0;
  datos.forEach(r=>{
    if(r[g]?.toLowerCase()==="hombre") h++;
    if(r[g]?.toLowerCase()==="mujer") m++;
  });

  total.innerText=datos.length;
  hombres.innerText=h;
  mujeres.innerText=m;

  let estacas={};
  datos.forEach(r=>{
    let est=r[e]||"Sin dato";
    if(!estacas[est]) estacas[est]={h:0,m:0};

    if(r[g]?.toLowerCase()==="hombre") estacas[est].h++;
    if(r[g]?.toLowerCase()==="mujer") estacas[est].m++;
  });

  let labels=Object.keys(estacas);
  let dh=labels.map(x=>estacas[x].h);
  let dm=labels.map(x=>estacas[x].m);

  if(chart) chart.destroy();
  chart=new Chart(graficaEstaca,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Hombres',data:dh},
      {label:'Mujeres',data:dm}
    ]}
  });

  if(tabla) tabla.destroy();
  tabla=$('#tablaData').DataTable({
    data:datos,
    columns:headersGlobal.map(h=>({title:h})),
    dom:'Bfrtip',
    buttons:['copy','csv','excel','pdf'],
    pageLength:100
  });
}

$('#filtroEstaca').on('change',actualizar);
$('#filtroBarrio').on('change',actualizar);
$('#filtroGenero').on('change',actualizar);

$('.tab').click(function(){
  $('.tab').removeClass('active');
  $(this).addClass('active');

  $('.section').removeClass('active-section');
  $('#'+$(this).data('tab')).addClass('active-section');
});
</script>

</body>
</html>
