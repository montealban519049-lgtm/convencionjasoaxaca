<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Interactivo JAS</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #14532d;
  color: white;
  padding: 20px;
}

h1 { text-align: center; }

/* filtros */
.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

/* KPIs */
.kpis {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  flex: 1;
  background: #166534;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

canvas {
  background: white;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  background: white;
  color: black;
}

.dt-button {
  background: white !important;
  color: #14532d !important;
  border-radius: 8px !important;
}
</style>
</head>

<body>

<h1>📊 Dashboard Interactivo JAS</h1>

<!-- 🎯 FILTROS -->
<div class="filtros">
  <select id="filtroEstaca"><option value="">Todas las Estacas</option></select>
  <select id="filtroGenero"><option value="">Todos los Géneros</option></select>
</div>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi"><h2 id="total">0</h2><p>Total</p></div>
  <div class="kpi"><h2 id="hombres">0</h2><p>Hombres</p></div>
  <div class="kpi"><h2 id="mujeres">0</h2><p>Mujeres</p></div>
</div>

<canvas id="grafica"></canvas>
<canvas id="graficaEstaca"></canvas>

<table id="tabla" class="display" style="width:100%"></table>

<script>
let dataGlobal = [];
let headersGlobal = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQXEHin29Er8xAayRXtZyYo1B4BnzfTGtpjGfk9rGg9uf-GfJmxHTx4G8krTP4r6w254gUzkPFOI020/pub?gid=162119901&single=true&output=csv")
.then(res => res.text())
.then(data => {

  const filas = data.trim().split("\n").map(f => f.split(","));
  headersGlobal = filas[0];
  dataGlobal = filas.slice(1);

  llenarFiltros();
  actualizarDashboard();

});

function llenarFiltros() {
  const estacaIndex = headersGlobal.findIndex(h => h.toLowerCase().includes("estaca"));
  const generoIndex = headersGlobal.findIndex(h => h.toLowerCase().includes("sexo"));

  let estacas = new Set();
  let generos = new Set();

  dataGlobal.forEach(row => {
    estacas.add(row[estacaIndex]);
    generos.add(row[generoIndex]);
  });

  estacas.forEach(e => $('#filtroEstaca').append(`<option>${e}</option>`));
  generos.forEach(g => $('#filtroGenero').append(`<option>${g}</option>`));
}

function obtenerFiltrado() {
  const estaca = $('#filtroEstaca').val();
  const genero = $('#filtroGenero').val();

  const estacaIndex = headersGlobal.findIndex(h => h.toLowerCase().includes("estaca"));
  const generoIndex = headersGlobal.findIndex(h => h.toLowerCase().includes("sexo"));

  return dataGlobal.filter(row => {
    return (!estaca || row[estacaIndex] === estaca) &&
           (!genero || row[generoIndex] === genero);
  });
}

let chart1, chart2, tabla;

function actualizarDashboard() {
  const datos = obtenerFiltrado();

  const generoIndex = headersGlobal.findIndex(h => h.toLowerCase().includes("sexo"));
  const estacaIndex = headersGlobal.findIndex(h => h.toLowerCase().includes("estaca"));

  let hombres = 0, mujeres = 0;

  datos.forEach(row => {
    if (row[generoIndex]?.toLowerCase() === "hombre") hombres++;
    if (row[generoIndex]?.toLowerCase() === "mujer") mujeres++;
  });

  document.getElementById("total").innerText = datos.length;
  document.getElementById("hombres").innerText = hombres;
  document.getElementById("mujeres").innerText = mujeres;

  if (chart1) chart1.destroy();
  chart1 = new Chart(document.getElementById("grafica"), {
    type: 'bar',
    data: {
      labels: ['Hombres', 'Mujeres'],
      datasets: [{ data: [hombres, mujeres] }]
    }
  });

  let estacas = {};
  datos.forEach(row => {
    let estaca = row[estacaIndex] || "Sin dato";
    let genero = row[generoIndex]?.toLowerCase();

    if (!estacas[estaca]) estacas[estaca] = {h:0,m:0};

    if (genero === "hombre") estacas[estaca].h++;
    if (genero === "mujer") estacas[estaca].m++;
  });

  const labels = Object.keys(estacas);
  const dataH = labels.map(e => estacas[e].h);
  const dataM = labels.map(e => estacas[e].m);

  if (chart2) chart2.destroy();
  chart2 = new Chart(document.getElementById("graficaEstaca"), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Hombres', data:dataH },
        { label:'Mujeres', data:dataM }
      ]
    }
  });

  if (tabla) tabla.destroy();
  tabla = $('#tabla').DataTable({
    data: datos,
    columns: headersGlobal.map(h => ({ title: h })),
    dom: 'Bfrtip',
    buttons: ['copy','csv','excel','pdf'],
    pageLength: 100
  });
}

// eventos filtros
$('#filtroEstaca, #filtroGenero').on('change', actualizarDashboard);
</script>

</body>
</html>
